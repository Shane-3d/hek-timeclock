<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0d0d0d" />
    <title>HEK Fencing — Time Clock</title>

    <!-- Home-screen / installed-app icon and name -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HEK Clock" />

    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="brand">
      <div class="hek">HEK</div>
      <div class="sub">FENCING</div>
      <div class="inc">Inc.</div>
    </div>

    <div class="wrap">
      <div class="big-clock" id="clock">--:--</div>
      <div class="big-date" id="date"></div>

      <!-- PIN entry view -->
      <div class="card" id="pinView">
        <h2 style="text-align:center;margin-top:0">Enter your PIN</h2>
        <div class="pin-display" id="dots"></div>
        <div class="keypad" id="keypad"></div>
        <div class="msg" id="pinMsg"></div>
      </div>

      <!-- Clock in/out view -->
      <div class="card" id="actionView" style="display:none">
        <p class="status-title">Hi, <span class="name" id="empName"></span></p>
        <p class="status-sub" id="empStatus"></p>

        <!-- Shown only when clocked in: required before clocking out -->
        <div id="workWrap" style="display:none;margin-bottom:14px">
          <label for="workDone">What did you work on today?</label>
          <textarea id="workDone" rows="3" placeholder="e.g. installed 120ft chain-link fence at Maple St"></textarea>

          <div style="margin-top:14px">
            <label>Clock-out time</label>
            <div class="cot-options">
              <label class="cot-option active" id="cotNowLabel">
                <input type="radio" name="cot" id="cotNow" value="now" checked />
                <span class="cot-title">Now</span>
                <span class="cot-sub" id="nowLabel"></span>
              </label>
              <label class="cot-option" id="cotOtherLabel">
                <input type="radio" name="cot" id="cotOther" value="other" />
                <span class="cot-title">Another time</span>
              </label>
            </div>
            <input type="datetime-local" id="customOut" class="cot-input" style="display:none" />
          </div>
        </div>

        <button class="btn in" id="actionBtn"></button>
        <div class="msg" id="actionMsg"></div>
        <button class="btn ghost" id="doneBtn" style="margin-top:16px">Cancel</button>
      </div>

      <!-- Missed clock-out view -->
      <div class="card" id="missedView" style="display:none">
        <h2 style="text-align:center;margin-top:0;color:var(--red)">Missed clock-out</h2>
        <p class="status-sub" id="missedIntro"></p>

        <label for="missedOut">What time did you finish that day?</label>
        <input type="datetime-local" id="missedOut" style="width:100%;margin-bottom:14px" />

        <label for="missedWork">What did you do that day?</label>
        <textarea id="missedWork" rows="3" style="margin-bottom:14px" placeholder="what you worked on"></textarea>

        <label for="missedReason">Why didn't you clock out?</label>
        <textarea id="missedReason" rows="2" placeholder="e.g. phone died / forgot"></textarea>

        <button class="btn gold" id="missedBtn" style="margin-top:14px">Submit</button>
        <div class="msg" id="missedMsg"></div>
        <button class="btn ghost" id="missedCancel" style="margin-top:12px">Cancel</button>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
